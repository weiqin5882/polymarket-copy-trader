version: '3.8'

services:
  copy-trader:
    build: .
    container_name: polymarket-copy-trader
    restart: unless-stopped
    
    volumes:
      # 配置文件
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      # 日志和数据持久化
      - ./logs:/app/logs
      - ./data:/app/data
    
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('https://data-api.polymarket.com', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

